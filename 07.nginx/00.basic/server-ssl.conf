server{
    listen 443 ssl http2;
    server_name pritunl.xxx.com;
    ssl_certificate /usr/local/nginx/certs/xxx.com.crt;
    ssl_certificate_key /usr/local/nginx/certs/xxx.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    access_log logs/pritunl.xxx.com.access.log main;
    error_log logs/pritunl.xxx.com.error.log;

    location / {
        #####################################
        # 基础代理
        #####################################
        proxy_pass https://172.18.27.88:8443;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        #####################################
        # Header 控制
        #####################################
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        #####################################
        # 连接 & 超时控制
        #####################################
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }
}

# version 升级
# 让 Nginx 和后端之间使用 HTTP/1.1，而不是默认的 HTTP/1.0
# 如果你没开 1.1:keepalive 根本不生效，HTTP/1.0 默认短连接，HTTP/1.1 默认长连接 WebSocket 依赖 HTTP/1.1 的 Upgrade 机制，必须这样写
# 后端是流式响应 streaming 的接口
# 现代新的web服务基本上都支持HTTP/1.1

server{
    listen 80;
    server_name xxx.cainiao.cloud;

    access_log logs/pritunl.xxx.com.access.log main;
    error_log logs/pritunl.xxx.com.error.log;

    return 302 https://$host$request_uri;
}
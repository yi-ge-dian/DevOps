log_format emqx_mqtt_format '$remote_addr [$time_local] '
                   '$protocol $status $bytes_sent $bytes_received '
                   '$session_time';

upstream mqtt_servers {
    server 10.0.0.71:1883 weight=1 max_fails=2 fail_timeout=90s;
    server 10.0.0.72:1883 weight=2 max_fails=2 fail_timeout=90s;
    server 10.0.0.73:1883 weight=2 max_fails=2 fail_timeout=90s;
}

server {
    listen 1883;
    proxy_pass mqtt_servers;
    access_log /var/log/nginx/emqx/emqx_mqtt.access.log emqx_mqtt_format;
    error_log /var/log/nginx/emqx/emqx_mqtt.error.log warn;

    # 启用此项时，对应后端 EMQX 监听器也必须启用 proxy_protocol
    proxy_protocol on;
    proxy_connect_timeout 10s;
    # MQTT 长连接心跳超时时间
    proxy_timeout 1800s;
    proxy_buffer_size 3M;
    tcp_nodelay on;
}
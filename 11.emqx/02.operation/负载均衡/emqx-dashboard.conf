upstream emqx_dashboard_servers {
  server 10.0.0.71:18083 weight=1 max_fails=2 fail_timeout=90s;
  server 10.0.0.72:18083 weight=2 max_fails=2 fail_timeout=90s;
  server 10.0.0.73:18083 weight=2 max_fails=2 fail_timeout=90s;
}

server {
  listen 443 ssl;
  server_name emqx-dashboard.csnd-uat-hd.com;
  access_log /var/log/nginx/emqx/emqx_dashboard.access.log main;
  error_log /var/log/nginx/emqx/emqx_dashboard.error.log warn;

  # SSL 相关配置
  ssl_certificate /etc/nginx/certs/csnd-uat-hd.com.crt;
  ssl_certificate_key /etc/nginx/certs/csnd-uat-hd.com.key;

  location / {
    proxy_pass http://emqx_dashboard_servers;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
upstream mqtt_websocket_ssl_servers {
  server 10.0.0.71:8083 weight=1 max_fails=2 fail_timeout=90s;
  server 10.0.0.72:8083 weight=2 max_fails=2 fail_timeout=90s;
  server 10.0.0.73:8083 weight=2 max_fails=2 fail_timeout=90s;
}

server {
  listen 443 ssl;
  server_name mqtt-websocket-ssl.csnd-uat-hd.com;
  access_log /var/log/nginx/emqx/emqx_websocket.access.log main;
  error_log /var/log/nginx/emqx/emqx_websocket.error.log warn;

  # SSL 相关配置
  ssl_session_cache shared:STREAM_MQTT_SSL:10m;
  ssl_session_timeout 10m;
  ssl_certificate /etc/nginx/certs/csnd-uat-hd.com.crt;
  ssl_certificate_key /etc/nginx/certs/csnd-uat-hd.com.key;
  ssl_verify_depth 2;
  ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # 添加 CA 证书及开启验证客户端证书参数即可启用双向认证
  # ssl_client_certificate /usr/local/NGINX/certs/ca.pem;
  # ssl_verify_client on;

  location /mqtt {
    proxy_pass http://mqtt_websocket_ssl_servers;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_connect_timeout 10s;
    # WebSocket 连接有效时间
    # 在该时间内没有数据交互的话 WebSocket 连接会自动断开，默认为 60s
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    # 反向代理真实 IP
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header REMOTE-HOST $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # 禁用缓存
    proxy_buffering off;
  }
}
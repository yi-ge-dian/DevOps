log_format emqx_mqtt_ssl_format '$remote_addr [$time_local] '
                   '$protocol $status $bytes_sent $bytes_received '
                   '$session_time';

upstream mqtt_ssl_servers {
    server 10.0.0.71:1883 weight=1 max_fails=2 fail_timeout=90s;
    server 10.0.0.72:1883 weight=2 max_fails=2 fail_timeout=90s;
    server 10.0.0.73:1883 weight=2 max_fails=2 fail_timeout=90s;
}

server {
    listen 8883 ssl;
    proxy_pass mqtt_ssl_servers;

    access_log /var/log/nginx/emqx/emqx_mqtt_ssl.access.log emqx_mqtt_ssl_format;
    error_log /var/log/nginx/emqx/emqx_mqtt_ssl.error.log warn;

    # SSL 相关配置
    ssl_session_cache shared:STREAM_MQTT_SSL:10m;
    ssl_session_timeout 10m;
    ssl_certificate /etc/nginx/certs/csnd-uat-hd.com.crt;
    ssl_certificate_key /etc/nginx/certs/csnd-uat-hd.com.key;
    ssl_verify_depth 2;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;

    ssl_ciphers HIGH:!aNULL:!MD5;

    # 双向认证（按需开启）
    # ssl_client_certificate /usr/local/NGINX/certs/ca.pem;
    # ssl_verify_client on;
    # ssl_verify_depth 1;

    # 启用此项时，对应后端 EMQX 监听器也必须启用 proxy_protocol
    proxy_protocol on;
    proxy_connect_timeout 10s;
    # MQTT 长连接心跳超时时间
    proxy_timeout 1800s;
    proxy_buffer_size 3M;
    tcp_nodelay on;
}
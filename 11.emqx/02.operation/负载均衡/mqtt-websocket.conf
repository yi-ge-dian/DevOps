upstream mqtt_websocket_servers {
  server 10.0.0.71:8083 weight=1 max_fails=2 fail_timeout=90s;
  server 10.0.0.72:8083 weight=2 max_fails=2 fail_timeout=90s;
  server 10.0.0.73:8083 weight=2 max_fails=2 fail_timeout=90s;
}

server {
  listen 80;
  server_name mqtt-websocket.csnd-uat-hd.com;
  access_log /var/log/nginx/emqx/emqx_websocket.access.log main;
  error_log /var/log/nginx/emqx/emqx_websocket.error.log warn;

  location /mqtt {
    proxy_pass http://mqtt_websocket_servers;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    # 禁用缓存
    proxy_buffering off;

    proxy_connect_timeout 10s;
    # WebSocket 连接有效时间
    # 在该时间内没有数据交互的话 WebSocket 连接会自动断开，默认为 60s
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    # 反向代理真实 IP
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header REMOTE-HOST $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

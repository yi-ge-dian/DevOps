#【必须】修改 namespace --> xxxx
#【必须】修改 password 的 base64 编码 --> yyyy
#【必须】修改 storageClassName
#【必须】修改 image
#【必须】修改 svc-redis-nodeport
#【非必须】修改 resource requests/limits maxmemory
apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-redis-dev
  namespace: xxxx
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    maxmemory 400mb
    maxmemory-policy volatile-lru
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10
    save 60 10000
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-redis-dev
  namespace: xxxx
type: Opaque
data:
  password: yyyy
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-redis-dev
  namespace: xxxx
  labels:
    app: redis-dev
spec:
  serviceName: svc-redis-headless-dev
  replicas: 1
  selector:
    matchLabels:
      app: redis-dev
  template:
    metadata:
      labels:
        app: redis-dev
    spec:
      containers:
        - name: redis
          image: docker-host.csnd.com/redis:7.4.8-alpine-amd64
          command:
            - redis-server
          args:
            - /etc/redis/redis.conf
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-redis-dev
                  key: password
          volumeMounts:
            - name: redis-conf
              mountPath: /etc/redis/redis.conf
              subPath: redis.conf
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$REDIS_PASSWORD" ping | grep -q PONG
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: redis-conf
          configMap:
            name: cm-redis-dev
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: 10Gi
        storageClassName: nfs-client-ssd
---
apiVersion: v1
kind: Service
metadata:
  name: svc-redis-headless-dev
  namespace: xxxx
spec:
  clusterIP: None
  selector:
    app: redis-dev
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: svc-redis-nodeport-dev
  namespace: xxxx
spec:
  selector:
    app: redis-dev
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      nodePort: 30000
  type: NodePort

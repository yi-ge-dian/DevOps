#【必须】修改 namespace
#【必须】修改 password 、username、database 的 base64 编码
#【必须】修改 storageClassName
#【必须】修改 image
#【非必须】修改 resource requests/limits maxmemory
#【非必须】修改 svc-postgresql-nodeport
apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-postgresql
  namespace: xxxx
data:
  postgresql.conf: |
    listen_addresses = '*'
    port = 5432
    max_connections = 400
    shared_buffers = 256MB
    effective_cache_size = 768MB
    maintenance_work_mem = 64MB
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    default_statistics_target = 100
    random_page_cost = 1.1
    effective_io_concurrency = 200
    work_mem = 4MB
    min_wal_size = 1GB
    max_wal_size = 4GB
    max_worker_processes = 4
    max_parallel_workers_per_gather = 2
    max_parallel_workers = 4
    max_parallel_maintenance_workers = 2
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-postgresql
  namespace: xxxx
type: Opaque
data:
  password: yyyy
  username: postgres
  database: zzzz
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-postgresql
  namespace: xxxx
  labels:
    app: postgresql
spec:
  serviceName: svc-postgresql-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: docker-host.csnd.com/postgres:18.4-alpine-amd64
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: secret-postgresql
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: secret-postgresql
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret-postgresql
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_INITDB_ARGS
              value: "--data-checksums"
          ports:
            - name: postgresql
              containerPort: 5432
          volumeMounts:
            - name: postgresql-conf
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U ${POSTGRES_USER} -d "$POSTGRES_DB" -h 127.0.0.1 -p 5432
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: postgresql-conf
          configMap:
            name: cm-postgresql
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes:
          - "ReadWriteOnce"
        resources:
          requests:
            storage: 50Gi
        storageClassName: nfs-client-ssd
---
apiVersion: v1
kind: Service
metadata:
  name: svc-postgresql-headless
  namespace: xxxx
spec:
  clusterIP: None
  selector:
    app: postgresql
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
